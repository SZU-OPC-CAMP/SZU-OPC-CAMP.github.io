<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Spanish learning assistant project poster</title>
  <desc id="desc">A clean project poster with Spanish learning cards, search panels, and warm accent colors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff6e8"/>
