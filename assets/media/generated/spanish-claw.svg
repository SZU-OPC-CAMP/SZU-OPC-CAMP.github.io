    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4f7b"/>
      <stop offset="1" stop-color="#ffb000"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" rx="54" fill="url(#bg)"/>
  <circle cx="1010" cy="155" r="150" fill="#ffffff" opacity="0.54"/>
  <circle cx="180" cy="680" r="190" fill="#ffffff" opacity="0.52"/>
  <rect x="140" y="132" width="920" height="536" rx="40" fill="#fff" opacity="0.86"/>
  <rect x="198" y="194" width="430" height="104" rx="28" fill="#fff7eb" stroke="#ffd59b"/>
